# /etc/nginx/sites-available/meridian.conf
#
# Meridian Retail Group — Reverse Proxy Configuration (HTTPS — Phase 2)
#
# This is what your configuration will look like AFTER running:
#   sudo certbot --nginx -d shop.yourdomain.com
#
# Certbot rewrites your HTTP-only config automatically — it adds the
# server block below, the SSL certificate paths, and the HTTP→HTTPS
# redirect. This file is provided so you can see exactly what Certbot
# generates and understand each line rather than treating it as magic.
#
# DO NOT apply this file manually before running Certbot — let Certbot
# generate it for you, then compare against this reference.

server {
    listen 80;
    listen [::]:80;
    server_name shop.yourdomain.com;

    # Certbot adds this redirect block automatically
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name shop.yourdomain.com;

    # ── TLS — added by Certbot ───────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/shop.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shop.yourdomain.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ── Frontend ─────────────────────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Auth Service ─────────────────────────────────────────────────────
    location /api/auth/ {
        proxy_pass http://127.0.0.1:8001/api/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Catalog Service ──────────────────────────────────────────────────
    location /api/catalog/ {
        proxy_pass http://127.0.0.1:8002/api/catalog/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Orders Service ───────────────────────────────────────────────────
    location /api/orders {
        proxy_pass http://127.0.0.1:8003/api/orders;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /nginx-health {
        access_log off;
        return 200 "nginx ok\n";
        add_header Content-Type text/plain;
    }
}
