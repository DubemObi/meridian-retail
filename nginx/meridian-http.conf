# /etc/nginx/sites-available/meridian.conf
#
# Meridian Retail Group — Reverse Proxy Configuration (HTTP — Phase 1)
#
# This is the starting configuration interns deploy on Day 2 before adding
# TLS with Certbot on Day 4. It routes a single domain to the frontend and
# proxies API paths to the three backend services running in Docker Compose
# on localhost.
#
# Install location on the EC2 instance: /etc/nginx/sites-available/meridian.conf
# Then: sudo ln -s /etc/nginx/sites-available/meridian.conf /etc/nginx/sites-enabled/
#       sudo nginx -t
#       sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;

    server_name shop.yourdomain.com;

    # ── Frontend ─────────────────────────────────────────────────────────
    # All requests that do not match /api/* below are served by the
    # frontend container (Nginx serving static index.html on port 8080).
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Auth Service ─────────────────────────────────────────────────────
    # FastAPI service running on host port 8001 (mapped from container 8000)
    location /api/auth/ {
        proxy_pass http://127.0.0.1:8001/api/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Catalog Service ──────────────────────────────────────────────────
    # Express service running on host port 8002 (mapped from container 4000)
    location /api/catalog/ {
        proxy_pass http://127.0.0.1:8002/api/catalog/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Orders Service ───────────────────────────────────────────────────
    # FastAPI service running on host port 8003 (mapped from container 8001)
    location /api/orders {
        proxy_pass http://127.0.0.1:8003/api/orders;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check endpoint for the reverse proxy itself
    location /nginx-health {
        access_log off;
        return 200 "nginx ok\n";
        add_header Content-Type text/plain;
    }
}
