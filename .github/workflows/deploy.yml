# .github/workflows/deploy.yml
# Meridian Retail Group — CD Pipeline
#
# Runs on push to main. Builds all four images, pushes to ECR,
# then SSHes into the EC2 instance to pull and restart the stack.
#
# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID       — IAM user/role access key for ECR push
#   AWS_SECRET_ACCESS_KEY   — IAM user/role secret key
#   AWS_REGION               e.g. eu-west-2
#   ECR_REGISTRY              e.g. 123456789012.dkr.ecr.eu-west-2.amazonaws.com
#   EC2_HOST                 EC2 public IP or DNS
#   EC2_USER                 SSH username (ubuntu)
#   EC2_SSH_KEY               Private key contents (.pem file)

name: CD — Build, Push to ECR, Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, catalog-service, orders-service, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push ${{ matrix.service }}
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/meridian-${{ matrix.service }}:$IMAGE_TAG \
                        -t $ECR_REGISTRY/meridian-${{ matrix.service }}:latest \
                        ./${{ matrix.service }}
          docker push $ECR_REGISTRY/meridian-${{ matrix.service }}:$IMAGE_TAG
          docker push $ECR_REGISTRY/meridian-${{ matrix.service }}:latest

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/meridian-retail

            # Authenticate Docker on the EC2 instance to ECR
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
              docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}

            # Update image references and pull
            export ECR_REGISTRY=${{ secrets.ECR_REGISTRY }}
            export IMAGE_TAG=${{ github.sha }}

            docker compose pull
            docker compose up -d --remove-orphans

            # Wait for services to settle then verify
            sleep 10
            docker compose ps

            echo "=== Health check ==="
            curl -sf http://127.0.0.1:8001/healthz || echo "auth-service unhealthy"
            curl -sf http://127.0.0.1:8002/healthz || echo "catalog-service unhealthy"
            curl -sf http://127.0.0.1:8003/healthz || echo "orders-service unhealthy"
